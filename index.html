<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kärcher Quality KPI 2026 Roadmap</title>
    <!-- Essential Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.10.3/umd/Recharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; background-color: #f8f9fa; }
        .karcher-skew { transform: skewX(-12deg); }
        /* Custom scrollbar for better look in embed */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #000; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-black mx-auto mb-4"></div>
                <p class="font-bold text-gray-400 uppercase tracking-widest text-[10px]">Loading Dashboard...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const App = () => {
            const [libReady, setLibReady] = useState(false);

            useEffect(() => {
                if (window.Recharts) setLibReady(true);
                if (window.lucide) window.lucide.createIcons();
            }, []);

            if (!libReady && !window.Recharts) return null;

            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = window.Recharts;

            const kpiData = {
                quality: [
                    { name: 'TCOQ', target: '≤ 1%', icon: 'trending-down' },
                    { name: 'Breakdown Rate', target: '≤ 1.20%', icon: 'alert-circle' },
                    { name: 'Product Audit', target: '< 8000 ppm', icon: 'search' },
                    { name: 'Free-Pass Rate', target: '≥ 65%', icon: 'check-circle-2' },
                    { name: 'Checking Date', target: '< 0.95 Day', icon: 'clock' },
                ],
                iqc_imm: [
                    { name: 'IQC PPM', target: '≤ 9000 Day', icon: 'truck' },
                    { name: 'IMM PPM', target: '≤ 900 ppm', icon: 'settings' },
                    { name: 'Packing Audit Rate', target: '≥ 2.5%', icon: 'search' },
                ],
                qc_testing: [
                    { name: 'Packaging Audit', target: '< 1500 ppm', icon: 'search' },
                    { name: 'Short Audit Rate', target: '> 1.30%', icon: 'shield-check' },
                    { name: 'Short Audit PPM', target: '≤ 6000 ppm', icon: 'alert-circle' },
                    { name: 'Product Audit Rate', target: '≥ 0.25%', icon: 'search' },
                ],
                sqe_qms: [
                    { name: 'SQI', target: '≤ 4%', icon: 'shield-check' },
                    { name: '8D Response Time', target: '≤ 60 Days', icon: 'clock' },
                    { name: 'Charge Back', target: '85%', icon: 'trending-down' },
                    { name: 'Audit Plan Rate', target: '100%', icon: 'clipboard-check' },
                    { name: 'NG Findings', target: '0', icon: 'alert-circle' },
                    { name: 'Production Release', target: '100%', icon: 'check-circle-2' },
                ]
            };

            const chartData = [
                { name: 'Prod Audit', value: 8000 },
                { name: 'Short Audit', value: 6000 },
                { name: 'Pack Audit', value: 1500 },
                { name: 'IMM PPM', value: 900 }
            ];

            const Icon = ({ name, className }) => <i data-lucide={name} className={className}></i>;

            const KPICard = ({ name, target, icon }) => (
                <div className="bg-white border-b-2 border-gray-100 p-3 shadow-sm hover:shadow-md transition-shadow flex items-center gap-3">
                    <div className="p-2 bg-gray-50 rounded-sm">
                        <Icon name={icon} className="w-4 h-4 text-black" />
                    </div>
                    <div className="flex-1 min-w-0">
                        <p className="text-[10px] font-bold text-gray-400 uppercase truncate leading-none mb-1">{name}</p>
                        <p className="text-sm font-black text-black leading-none">{target}</p>
                    </div>
                </div>
            );

            const SectionHeader = ({ icon, title }) => (
                <div className="flex items-center gap-2 mb-3 mt-6 first:mt-0">
                    <div className="bg-black p-1.5 rounded-sm">
                        <Icon name={icon} className="w-4 h-4 text-[#FFED00]" />
                    </div>
                    <h2 className="text-xs font-black uppercase tracking-tighter text-black">{title}</h2>
                    <div className="flex-1 h-px bg-gray-200 ml-2"></div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-6">
                    {/* Header - Compact */}
                    <header className="bg-[#FFED00] p-4 border-b-4 border-black mb-6 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-black text-[#FFED00] px-3 py-1.5 font-black text-xl karcher-skew italic leading-none">
                                KÄRCHER
                            </div>
                            <div>
                                <h1 className="text-sm font-black uppercase text-black leading-none tracking-tight">Quality KPI Roadmap 2026</h1>
                                <p className="text-[9px] font-bold text-black opacity-60 uppercase mt-0.5">Strategic Performance Targets</p>
                            </div>
                        </div>
                        <div className="hidden sm:block text-right">
                            <p className="text-[9px] font-black uppercase text-black">Status: Strategic Plan</p>
                            <p className="text-[8px] font-bold text-black/50">Updated: March 2024</p>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* KPI Columns */}
                        <div className="lg:col-span-2 space-y-2">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2">
                                <div className="space-y-2">
                                    <SectionHeader icon="shield-check" title="Quality Excellence" />
                                    {kpiData.quality.map((kpi, i) => <KPICard key={i} {...kpi} />)}
                                    
                                    <SectionHeader icon="settings" title="IQC & Manufacturing" />
                                    {kpiData.iqc_imm.map((kpi, i) => <KPICard key={i} {...kpi} />)}
                                </div>
                                <div className="space-y-2">
                                    <SectionHeader icon="search" title="QC & Testing" />
                                    {kpiData.qc_testing.map((kpi, i) => <KPICard key={i} {...kpi} />)}

                                    <SectionHeader icon="truck" title="SQE & Management" />
                                    {kpiData.sqe_qms.map((kpi, i) => <KPICard key={i} {...kpi} />)}
                                </div>
                            </div>
                        </div>

                        {/* Visual Summary Column */}
                        <div className="space-y-6">
                            <div className="bg-white p-5 shadow-sm border border-gray-100 rounded-sm">
                                <h3 className="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest border-b border-gray-100 pb-2">PPM Target Benchmarks</h3>
                                <div className="h-[250px] w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={chartData} layout="vertical" margin={{ left: -20, right: 20 }}>
                                            <CartesianGrid strokeDasharray="2 2" horizontal={true} vertical={false} stroke="#f0f0f0" />
                                            <XAxis type="number" hide />
                                            <YAxis dataKey="name" type="category" fontSize={9} fontWeight="bold" width={80} />
                                            <Tooltip 
                                                cursor={{fill: 'transparent'}}
                                                contentStyle={{ fontSize: '10px', fontWeight: 'bold', borderRadius: '0', border: '1px solid black' }}
                                            />
                                            <Bar dataKey="value" radius={[0, 2, 2, 0]} barSize={20}>
                                                {chartData.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={index === 0 ? "#000" : index === 1 ? "#333" : "#666"} />
                                                ))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            <div className="bg-black text-white p-5 rounded-sm shadow-md">
                                <h3 className="text-[10px] font-black uppercase text-[#FFED00] mb-4 tracking-widest leading-none">Process Compliance</h3>
                                <div className="space-y-4">
                                    {[
                                        { l: 'Audit Plan', v: 100 },
                                        { l: 'Prod Release', v: 100 },
                                        { l: 'Charge Back', v: 85 },
                                        { l: 'Free Pass', v: 65 }
                                    ].map((item, i) => (
                                        <div key={i}>
                                            <div className="flex justify-between text-[9px] font-black uppercase mb-1 tracking-tighter">
                                                <span>{item.l}</span>
                                                <span className="text-[#FFED00]">{item.v}%</span>
                                            </div>
                                            <div className="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                                                <div className="bg-[#FFED00] h-full" style={{ width: `${item.v}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer className="mt-12 pt-4 border-t border-gray-200 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4 text-[9px] font-bold text-gray-400 uppercase tracking-tighter">
                            <span>Data: SAC / SAP PP1 / AQ System</span>
                            <span className="w-1 h-1 bg-gray-300 rounded-full"></span>
                            <span>Monitoring: Monthly / Weekly</span>
                        </div>
                        <div className="text-[8px] font-bold text-gray-400 uppercase">
                            © 2026 Quality Department | Confidential
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
