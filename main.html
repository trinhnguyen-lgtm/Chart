<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kärcher Quality KPI 2026</title>
    <!-- Thư viện cần thiết - Sử dụng CDN ổn định hơn cho môi trường Embed -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.10.3/umd/Recharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; background-color: #f3f4f6; }
        .karcher-skew { transform: skewX(-12deg); }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black mx-auto mb-4"></div>
                <p class="font-bold text-gray-500 uppercase tracking-widest text-xs">Đang tải Dashboard...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        // Đảm bảo Recharts đã sẵn sàng
        const { useState, useEffect } = React;
        
        const App = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [libReady, setLibReady] = useState(false);

            useEffect(() => {
                // Kiểm tra thư viện Recharts đã tồn tại trên window chưa
                if (window.Recharts) {
                    setLibReady(true);
                }
                
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab]);

            if (!libReady && !window.Recharts) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="bg-red-50 p-6 border border-red-200 rounded text-center">
                            <p className="text-red-600 font-bold">Lỗi tải thư viện biểu đồ. Vui lòng làm mới trang.</p>
                        </div>
                    </div>
                );
            }

            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

            const kpiData = {
                quality: [
                    { name: 'TCOQ', value: 1, limit: '≤ 1%', unit: '%', icon: 'trending-down' },
                    { name: 'Break down rate', value: 1.2, limit: '≤ 1.20%', unit: '%', icon: 'alert-circle' },
                    { name: 'Product audit ppm', value: 8000, limit: '< 8000', unit: 'ppm', icon: 'search' },
                    { name: 'Free-pass', value: 65, limit: '≥ 65%', unit: '%', icon: 'check-circle-2' },
                    { name: 'Checking date', value: 0.95, limit: '< 0.95', unit: 'Day', icon: 'clock' },
                ],
                iqc_imm: [
                    { name: 'IQC PPM', value: 9000, limit: '≤ 9000', unit: 'Day', icon: 'truck' },
                    { name: 'IMM PPM', value: 900, limit: '≤ 900', unit: 'ppm', icon: 'settings' },
                    { name: 'Packing audit rate', value: 2.5, limit: '≥ 2.5%', unit: '%', icon: 'search' },
                ],
                qc_testing: [
                    { name: 'PPM Packaging', value: 1500, limit: '< 1500', unit: 'ppm', icon: 'search' },
                    { name: 'Short audit rate', value: 1.3, limit: '> 1.30%', unit: '%', icon: 'shield-check' },
                    { name: 'Short audit ppm', value: 6000, limit: '≤ 6000', unit: 'ppm', icon: 'alert-circle' },
                    { name: 'Product audit rate', value: 0.25, limit: '≥ 0.25%', unit: '%', icon: 'search' },
                ],
                sqe: [
                    { name: 'SQI', value: 4, limit: '≤ 4', unit: '%', icon: 'shield-check' },
                    { name: '8D Time', value: 60, limit: '≤ 60', unit: 'Day', icon: 'clock' },
                    { name: 'Charge back', value: 85, limit: '85', unit: '%', icon: 'trending-down' },
                ],
                qms_qp: [
                    { name: 'Audit Rate', value: 100, limit: '100%', unit: '%', icon: 'clipboard-check' },
                    { name: 'NG Findings', value: 0, limit: '≤ 0', unit: 'Qty', icon: 'alert-circle' },
                    { name: 'Process Audits', value: 6, limit: '6', unit: 'times', icon: 'search' },
                    { name: 'Prod Release', value: 100, limit: '100%', unit: '%', icon: 'check-circle-2' },
                ]
            };

            const Icon = ({ name, className }) => <i data-lucide={name} className={className}></i>;

            const KPICard = ({ title, value, unit, limit, icon }) => (
                <div className="bg-white border-l-4 border-[#FFED00] p-4 shadow-md rounded-sm">
                    <div className="flex items-start justify-between mb-2">
                        <div className="p-2 bg-gray-100 rounded-full">
                            <Icon name={icon} className="w-5 h-5 text-black" />
                        </div>
                        <span className="text-[10px] font-bold text-gray-400 uppercase">Target 2026</span>
                    </div>
                    <h3 className="text-sm font-bold text-gray-800 truncate mb-1">{title}</h3>
                    <div className="flex items-baseline gap-1">
                        <span className="text-2xl font-black text-black">{value}</span>
                        <span className="text-xs font-semibold text-gray-500">{unit}</span>
                    </div>
                    <div className="mt-2 text-[11px] font-medium text-gray-600 bg-gray-50 px-2 py-1 rounded-sm border border-gray-100">
                        Limit: <span className="font-bold">{limit}</span>
                    </div>
                </div>
            );

            const SectionHeader = ({ icon, title, subtitle }) => (
                <div className="flex items-center gap-3 mb-6 bg-black p-4 text-white rounded-sm">
                    <Icon name={icon} className="w-8 h-8 text-[#FFED00]" />
                    <div>
                        <h2 className="text-xl font-black uppercase leading-none tracking-tight">{title}</h2>
                        <p className="text-[10px] text-gray-400 uppercase mt-1 tracking-widest">{subtitle}</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <header className="bg-[#FFED00] px-6 py-6 border-b-8 border-black sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-black text-[#FFED00] px-4 py-2 font-black text-2xl karcher-skew italic">
                                    KÄRCHER
                                </div>
                                <div>
                                    <h1 className="text-xl font-black uppercase text-black leading-none">Quality KPI Roadmap</h1>
                                    <p className="text-xs font-bold text-black opacity-70">Strategic Targets 2026</p>
                                </div>
                            </div>
                            <nav className="flex gap-2 bg-black p-1 rounded-sm">
                                {['overview', 'details'].map((tab) => (
                                    <button
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`px-4 py-1 text-xs font-bold uppercase rounded-sm transition-colors ${
                                            activeTab === tab ? 'bg-[#FFED00] text-black' : 'text-white hover:bg-gray-800'
                                        }`}
                                    >
                                        {tab === 'overview' ? 'Tổng quan' : 'Chi tiết'}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {activeTab === 'overview' ? (
                            <div className="space-y-10">
                                <section>
                                    <SectionHeader icon="shield-check" title="Chất lượng Xuất sắc" subtitle="Chỉ số hiệu suất & Breakdown" />
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                                        {kpiData.quality.map((kpi, idx) => <KPICard key={idx} {...kpi} />)}
                                    </div>
                                </section>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <section>
                                        <SectionHeader icon="settings" title="IQC & Sản xuất" subtitle="Chất lượng đầu vào & Quy trình" />
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {kpiData.iqc_imm.map((kpi, idx) => <KPICard key={idx} {...kpi} />)}
                                        </div>
                                    </section>
                                    <section>
                                        <SectionHeader icon="search" title="QC & Thử nghiệm" subtitle="Kiểm định sản phẩm cuối" />
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {kpiData.qc_testing.map((kpi, idx) => <KPICard key={idx} {...kpi} />)}
                                        </div>
                                    </section>
                                </div>
                                <section>
                                    <SectionHeader icon="truck" title="Quản lý nhà cung ứng (SQE)" subtitle="Đánh giá & bồi hoàn" />
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        {kpiData.sqe.map((kpi, idx) => <KPICard key={idx} {...kpi} />)}
                                    </div>
                                </section>
                            </div>
                        ) : (
                            <div className="bg-white p-6 rounded-sm shadow-xl border-t-8 border-black">
                                <h2 className="text-xl font-black mb-6 border-b-4 border-[#FFED00] pb-1 inline-block uppercase">Phân tích mục tiêu 2026</h2>
                                <div className="grid md:grid-cols-2 gap-10">
                                    <div className="h-[400px] w-full">
                                        <p className="text-xs font-bold uppercase text-gray-500 mb-4">Biểu đồ PPM mục tiêu</p>
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={[
                                                { name: 'Product Audit', value: 8000 },
                                                { name: 'Short Audit', value: 6000 },
                                                { name: 'Package Audit', value: 1500 },
                                                { name: 'IMM PPM', value: 900 }
                                            ]}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                <XAxis dataKey="name" fontSize={10} fontWeight="bold" />
                                                <YAxis fontSize={10} />
                                                <Tooltip 
                                                    cursor={{fill: '#f3f4f6'}} 
                                                    contentStyle={{ borderRadius: '0', border: '2px solid black', backgroundColor: 'white' }} 
                                                />
                                                <Bar dataKey="value" fill="#000" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <div className="space-y-6">
                                        <p className="text-xs font-bold uppercase text-gray-500 mb-2">Tỷ lệ hoàn thành mục tiêu (%)</p>
                                        {[
                                            { l: 'Kế hoạch Audit (Audit Plan)', v: 100 },
                                            { l: 'Phát hành sản xuất (Prod Release)', v: 100 },
                                            { l: 'Tỷ lệ bồi hoàn (Charge Back)', v: 85 },
                                            { l: 'Tỷ lệ Free Pass', v: 65 }
                                        ].map((item, i) => (
                                            <div key={i}>
                                                <div className="flex justify-between text-[10px] font-black uppercase mb-1">
                                                    <span>{item.l}</span>
                                                    <span>{item.v}%</span>
                                                </div>
                                                <div className="w-full bg-gray-200 h-3">
                                                    <div className="bg-black h-full border-r-4 border-[#FFED00]" style={{ width: `${item.v}%` }}></div>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="mt-8 p-4 bg-black text-white rounded-sm">
                                            <h4 className="text-[10px] font-bold uppercase text-[#FFED00] mb-2 tracking-widest">Thời gian xử lý mục tiêu</h4>
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <p className="text-[9px] text-gray-400 uppercase">Đóng hồ sơ 8D</p>
                                                    <p className="text-lg font-black">60 NGÀY</p>
                                                </div>
                                                <div className="h-8 w-px bg-gray-700"></div>
                                                <div>
                                                    <p className="text-[9px] text-gray-400 uppercase">Kiểm tra (Checking)</p>
                                                    <p className="text-lg font-black">0.95 NGÀY</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-black text-white py-8 px-6 mt-12">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="text-[#FFED00] font-black text-xl karcher-skew italic">KÄRCHER</div>
                            <div className="text-[9px] font-bold uppercase tracking-widest text-gray-500 text-center md:text-right">
                                © 2026 Quality Department Roadmap | KVT Quality KPI Infographic
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
